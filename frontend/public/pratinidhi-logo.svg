<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0F1D32"/>
      <stop offset="100%" stop-color="#070D18"/>
    </radialGradient>
    
    <!-- Saffron to Green gradient for orbit -->
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF9933"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#138808"/>
    </linearGradient>

    <!-- Glow filter for the P -->
    <filter id="glowP" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Subtle glow for orbit -->
    <filter id="glowOrbit" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Glow for language nodes -->
    <filter id="glowNode" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="250" cy="250" r="245" fill="url(#bgGrad)" stroke="#1A2D4A" stroke-width="1.5"/>

  <!-- Outer subtle ring -->
  <circle cx="250" cy="250" r="230" fill="none" stroke="#1A2D4A" stroke-width="0.5" opacity="0.4"/>

  <!-- Orbital ellipse (tilted like the sketch) -->
  <g transform="rotate(-25, 250, 250)" filter="url(#glowOrbit)">
    <ellipse cx="250" cy="250" rx="195" ry="80" fill="none" stroke="url(#orbitGrad)" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- Central "P" letter -->
  <text x="250" y="290" 
        font-family="'Georgia', 'Playfair Display', serif" 
        font-size="180" 
        font-weight="bold" 
        fill="#FFFFFF" 
        text-anchor="middle" 
        filter="url(#glowP)"
        opacity="0.95">P</text>

  <!-- Language script nodes along the orbit -->
  <!-- Positioned along the tilted ellipse path -->
  
  <!-- Hindi - हि (top-right of orbit) -->
  <g transform="rotate(-25, 250, 250)">
    <!-- Node at 0° (right) -->
    <g transform="translate(445, 250)">
      <g transform="rotate(25, 0, 0)">
        <circle r="18" fill="#FF9933" opacity="0.9" filter="url(#glowNode)"/>
        <text y="6" font-family="'Noto Sans Devanagari', sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">हि</text>
      </g>
    </g>

    <!-- Tamil - த (top of orbit, ~50°) -->
    <g transform="translate(375, 189)">
      <g transform="rotate(25, 0, 0)">
        <circle r="16" fill="#E8870E" opacity="0.85" filter="url(#glowNode)"/>
        <text y="5" font-family="'Noto Sans Tamil', sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">த</text>
      </g>
    </g>

    <!-- Bengali - ব (~90° top) -->
    <g transform="translate(250, 170)">
      <g transform="rotate(25, 0, 0)">
        <circle r="16" fill="#CCCCCC" opacity="0.8" filter="url(#glowNode)"/>
        <text y="5" font-family="'Noto Sans Bengali', sans-serif" font-size="13" fill="#1A1A2E" text-anchor="middle" font-weight="bold">ব</text>
      </g>
    </g>

    <!-- Telugu - తె (~130° top-left) -->
    <g transform="translate(125, 189)">
      <g transform="rotate(25, 0, 0)">
        <circle r="16" fill="#FFFFFF" opacity="0.85" filter="url(#glowNode)"/>
        <text y="5" font-family="'Noto Sans Telugu', sans-serif" font-size="13" fill="#1A1A2E" text-anchor="middle" font-weight="bold">తె</text>
      </g>
    </g>

    <!-- Marathi - म (left, ~180°) -->
    <g transform="translate(55, 250)">
      <g transform="rotate(25, 0, 0)">
        <circle r="18" fill="#138808" opacity="0.9" filter="url(#glowNode)"/>
        <text y="6" font-family="'Noto Sans Devanagari', sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">म</text>
      </g>
    </g>

    <!-- Gujarati - ગુ (~230° bottom-left) -->
    <g transform="translate(125, 311)">
      <g transform="rotate(25, 0, 0)">
        <circle r="16" fill="#10B981" opacity="0.85" filter="url(#glowNode)"/>
        <text y="5" font-family="'Noto Sans Gujarati', sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">ગુ</text>
      </g>
    </g>

    <!-- Kannada - ಕ (~270° bottom) -->
    <g transform="translate(250, 330)">
      <g transform="rotate(25, 0, 0)">
        <circle r="16" fill="#DDDDDD" opacity="0.8" filter="url(#glowNode)"/>
        <text y="5" font-family="'Noto Sans Kannada', sans-serif" font-size="13" fill="#1A1A2E" text-anchor="middle" font-weight="bold">ಕ</text>
      </g>
    </g>

    <!-- Punjabi - ਪ (~310° bottom-right) -->
    <g transform="translate(375, 311)">
      <g transform="rotate(25, 0, 0)">
        <circle r="16" fill="#F59E0B" opacity="0.85" filter="url(#glowNode)"/>
        <text y="5" font-family="'Noto Sans Gurmukhi', sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">ਪ</text>
      </g>
    </g>
  </g>

  <!-- Small decorative dots along orbit for polish -->
  <g transform="rotate(-25, 250, 250)" opacity="0.3">
    <circle cx="310" cy="178" r="2" fill="#FF9933"/>
    <circle cx="190" cy="322" r="2" fill="#138808"/>
    <circle cx="420" cy="230" r="2" fill="#FFFFFF"/>
    <circle cx="80" cy="270" r="2" fill="#FFFFFF"/>
    <circle cx="335" cy="305" r="1.5" fill="#FF9933"/>
    <circle cx="165" cy="195" r="1.5" fill="#138808"/>
  </g>
</svg>
