<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRATINIDHI Logo Transition</title>
  <style>
    :root {
      --bg-color: #0A1628; /* Deep Navy from your theme */
      --saffron: #FF9933;
      --white: #FFFFFF;
      --green: #138808;
    }
    
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    .splash-container {
      position: relative;
      width: 300px;
      height: 300px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 1. The central 'P' drawing animation */
    .logo-p {
      position: absolute;
      width: 120px;
      height: 160px;
      z-index: 10;
    }

    .p-path {
      fill: none;
      stroke: var(--white);
      stroke-width: 14;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 600;
      stroke-dashoffset: 600;
      /* Draw the line over 1.5 seconds */
      animation: drawP 1.5s cubic-bezier(0.8, 0, 0.2, 1) forwards, 
                 glowWhite 2s ease-in-out 1.5s infinite alternate;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.4));
    }

    /* 2. The expanding transparent glass orbit */
    .glass-orbit {
      position: absolute;
      width: 250px;
      height: 100px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      transform: rotate(-20deg) scale(0);
      opacity: 0;
      box-shadow: 
        inset 0 0 20px rgba(255, 153, 51, 0.2), 
        0 0 20px rgba(19, 136, 8, 0.2);
      /* Pop outward after the P is drawn */
      animation: popOrbit 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) 1.2s forwards;
      z-index: 5;
    }

    /* 3. The floating language orbs */
    .orb-container {
      position: absolute;
      width: 250px;
      height: 100px;
      transform: rotate(-20deg);
      z-index: 15;
    }

    .orb {
      position: absolute;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 14px;
      color: #0A1628;
      opacity: 0;
      transform: scale(0);
      /* Orbit rotation animation */
      animation: appearOrb 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
                 float 3s ease-in-out infinite alternate;
      box-shadow: 0 0 15px currentColor;
    }
    
    .orb-text {
      transform: rotate(20deg); /* Counter-rotate text so it stays upright */
      text-shadow: none;
    }

    /* Orb specific positioning and colors matching "less green" theme */
    .orb:nth-child(1) { top: -16px; left: 109px; background: var(--saffron); color: white; animation-delay: 1.5s, 1.5s; }
    .orb:nth-child(2) { top: 15px; left: 220px; background: var(--white); animation-delay: 1.7s, 1.7s; }
    .orb:nth-child(3) { bottom: -16px; left: 109px; background: var(--saffron); color: white; animation-delay: 1.9s, 1.9s; }
    .orb:nth-child(4) { top: 34px; left: -16px; background: var(--green); color: white; animation-delay: 2.1s, 2.1s; } /* Only 1 green orb */


    /* 4. Text reveal */
    .brand-text {
      position: absolute;
      bottom: -60px;
      color: var(--white);
      font-size: 24px;
      letter-spacing: 12px;
      font-weight: 800;
      opacity: 0;
      transform: translateY(20px);
      animation: revealText 1s cubic-bezier(0.2, 0.8, 0.2, 1) 2.2s forwards;
    }

    .sub-text {
      position: absolute;
      bottom: -85px;
      color: #94A3B8;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0;
      animation: revealText 1s cubic-bezier(0.2, 0.8, 0.2, 1) 2.4s forwards;
    }

    /* Animations */
    @keyframes drawP {
      to { stroke-dashoffset: 0; fill: rgba(255,255,255,1); }
    }

    @keyframes glowWhite {
      from { filter: drop-shadow(0 0 5px rgba(255,255,255,0.4)); }
      to   { filter: drop-shadow(0 0 25px rgba(255,255,255,0.8)); }
    }

    @keyframes popOrbit {
      to { transform: rotate(-20deg) scale(1); opacity: 1; }
    }

    @keyframes appearOrb {
      to { opacity: 1; transform: scale(1); }
    }
    
    @keyframes float {
      from { transform: scale(1) translateY(0px); }
      to { transform: scale(1.05) translateY(-6px); }
    }

    @keyframes revealText {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Restart button for preview purposes only */
    .restart-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }
    .restart-btn:hover {
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>

  <button class="restart-btn" onclick="location.reload()">Replay Transition</button>

  <div class="splash-container">
    
    <!-- 1. Central SVG 'P' -->
    <svg class="logo-p" viewBox="0 0 120 160">
      <!-- Abstract swooping P shape -->
      <path class="p-path" 
            d="M 30,150 
               L 40,30 
               C 40,30 110,20 110,70 
               C 110,120 45,100 35,95" />
    </svg>

    <!-- 2. Transparent Glass Orbit Ring -->
    <div class="glass-orbit"></div>

    <!-- 3. Floating Language Orbs -->
    <div class="orb-container">
      <div class="orb"><span class="orb-text">अ</span></div>
      <div class="orb"><span class="orb-text">அ</span></div>
      <div class="orb"><span class="orb-text">అ</span></div>
      <div class="orb"><span class="orb-text">ಅ</span></div>
    </div>

    <!-- 4. Text Reveal -->
    <div class="brand-text">PRATINIDHI</div>
    <div class="sub-text">AI Governance Platform</div>
  </div>

</body>
</html>
