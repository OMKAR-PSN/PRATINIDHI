<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRATINIDHI Logo Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #050A14;
      font-family: 'Segoe UI', sans-serif;
      gap: 40px;
    }
    h1 {
      color: #fff;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.5;
    }
    .logo-container {
      width: 400px;
      height: 400px;
      position: relative;
    }

    /* Animated version */
    .logo-animated {
      width: 400px;
      height: 400px;
    }

    @keyframes spin {
      from { transform: rotate(-25deg); }
      to { transform: rotate(335deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    .orbit-group { animation: spin 20s linear infinite; transform-origin: 250px 250px; }
    .orbit-line { animation: pulse 3s ease-in-out infinite; }
    .lang-node { animation: fadeIn 0.5s ease-out both; }
    .lang-node:nth-child(1) { animation-delay: 0.1s; }
    .lang-node:nth-child(2) { animation-delay: 0.2s; }
    .lang-node:nth-child(3) { animation-delay: 0.3s; }
    .lang-node:nth-child(4) { animation-delay: 0.4s; }
    .lang-node:nth-child(5) { animation-delay: 0.5s; }
    .lang-node:nth-child(6) { animation-delay: 0.6s; }
    .lang-node:nth-child(7) { animation-delay: 0.7s; }
    .lang-node:nth-child(8) { animation-delay: 0.8s; }

    .versions {
      display: flex;
      gap: 80px;
      align-items: center;
    }
    .version-label {
      color: #94A3B8;
      font-size: 12px;
      text-align: center;
      margin-top: 16px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Text below logo */
    .brand-text {
      text-align: center;
    }
    .brand-text h2 {
      color: #FFFFFF;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 8px;
      margin-bottom: 6px;
    }
    .brand-text p {
      background: linear-gradient(90deg, #FF9933, #FFFFFF, #138808);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <h1>PRATINIDHI Logo Preview</h1>

  <div class="versions">
    <!-- STATIC VERSION -->
    <div>
      <div class="logo-container">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="400" height="400">
          <defs>
            <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#0F1D32"/>
              <stop offset="100%" stop-color="#070D18"/>
            </radialGradient>
            <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#FF9933"/>
              <stop offset="50%" stop-color="#FFFFFF"/>
              <stop offset="100%" stop-color="#138808"/>
            </linearGradient>
            <filter id="glowP" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="6" result="blur"/>
              <feComposite in="SourceGraphic" in2="blur" operator="over"/>
            </filter>
            <filter id="glowOrbit" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="2.5" result="blur"/>
              <feComposite in="SourceGraphic" in2="blur" operator="over"/>
            </filter>
            <filter id="glowNode" x="-100%" y="-100%" width="300%" height="300%">
              <feGaussianBlur stdDeviation="3" result="blur"/>
              <feComposite in="SourceGraphic" in2="blur" operator="over"/>
            </filter>
          </defs>
          <circle cx="250" cy="250" r="245" fill="url(#bgGrad)" stroke="#1A2D4A" stroke-width="1.5"/>
          <circle cx="250" cy="250" r="230" fill="none" stroke="#1A2D4A" stroke-width="0.5" opacity="0.4"/>
          <g transform="rotate(-25, 250, 250)" filter="url(#glowOrbit)">
            <ellipse cx="250" cy="250" rx="195" ry="80" fill="none" stroke="url(#orbitGrad)" stroke-width="2" opacity="0.7"/>
          </g>
          <text x="250" y="290" font-family="Georgia, 'Playfair Display', serif" font-size="180" font-weight="bold" fill="#FFFFFF" text-anchor="middle" filter="url(#glowP)" opacity="0.95">P</text>
          <g transform="rotate(-25, 250, 250)">
            <g transform="translate(445, 250)"><g transform="rotate(25, 0, 0)"><circle r="18" fill="#FF9933" opacity="0.9" filter="url(#glowNode)"/><text y="6" font-family="'Noto Sans Devanagari', sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">हि</text></g></g>
            <g transform="translate(375, 189)"><g transform="rotate(25, 0, 0)"><circle r="16" fill="#E8870E" opacity="0.85" filter="url(#glowNode)"/><text y="5" font-family="'Noto Sans Tamil', sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">த</text></g></g>
            <g transform="translate(250, 170)"><g transform="rotate(25, 0, 0)"><circle r="16" fill="#CCCCCC" opacity="0.8" filter="url(#glowNode)"/><text y="5" font-family="'Noto Sans Bengali', sans-serif" font-size="13" fill="#1A1A2E" text-anchor="middle" font-weight="bold">ব</text></g></g>
            <g transform="translate(125, 189)"><g transform="rotate(25, 0, 0)"><circle r="16" fill="#FFFFFF" opacity="0.85" filter="url(#glowNode)"/><text y="5" font-family="'Noto Sans Telugu', sans-serif" font-size="13" fill="#1A1A2E" text-anchor="middle" font-weight="bold">తె</text></g></g>
            <g transform="translate(55, 250)"><g transform="rotate(25, 0, 0)"><circle r="18" fill="#138808" opacity="0.9" filter="url(#glowNode)"/><text y="6" font-family="'Noto Sans Devanagari', sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">म</text></g></g>
            <g transform="translate(125, 311)"><g transform="rotate(25, 0, 0)"><circle r="16" fill="#10B981" opacity="0.85" filter="url(#glowNode)"/><text y="5" font-family="'Noto Sans Gujarati', sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">ગુ</text></g></g>
            <g transform="translate(250, 330)"><g transform="rotate(25, 0, 0)"><circle r="16" fill="#DDDDDD" opacity="0.8" filter="url(#glowNode)"/><text y="5" font-family="'Noto Sans Kannada', sans-serif" font-size="13" fill="#1A1A2E" text-anchor="middle" font-weight="bold">ಕ</text></g></g>
            <g transform="translate(375, 311)"><g transform="rotate(25, 0, 0)"><circle r="16" fill="#F59E0B" opacity="0.85" filter="url(#glowNode)"/><text y="5" font-family="'Noto Sans Gurmukhi', sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">ਪ</text></g></g>
          </g>
          <g transform="rotate(-25, 250, 250)" opacity="0.3">
            <circle cx="310" cy="178" r="2" fill="#FF9933"/>
            <circle cx="190" cy="322" r="2" fill="#138808"/>
            <circle cx="420" cy="230" r="2" fill="#FFFFFF"/>
            <circle cx="80" cy="270" r="2" fill="#FFFFFF"/>
            <circle cx="335" cy="305" r="1.5" fill="#FF9933"/>
            <circle cx="165" cy="195" r="1.5" fill="#138808"/>
          </g>
        </svg>
      </div>
      <p class="version-label">Static</p>
    </div>

    <!-- ANIMATED VERSION -->
    <div>
      <div class="logo-animated">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="400" height="400">
          <defs>
            <radialGradient id="bgGrad2" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#0F1D32"/>
              <stop offset="100%" stop-color="#070D18"/>
            </radialGradient>
            <linearGradient id="orbitGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#FF9933"/>
              <stop offset="50%" stop-color="#FFFFFF"/>
              <stop offset="100%" stop-color="#138808"/>
            </linearGradient>
            <filter id="glowP2" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="6" result="blur"/>
              <feComposite in="SourceGraphic" in2="blur" operator="over"/>
            </filter>
            <filter id="glowOrbit2" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="2.5" result="blur"/>
              <feComposite in="SourceGraphic" in2="blur" operator="over"/>
            </filter>
            <filter id="glowNode2" x="-100%" y="-100%" width="300%" height="300%">
              <feGaussianBlur stdDeviation="3" result="blur"/>
              <feComposite in="SourceGraphic" in2="blur" operator="over"/>
            </filter>
          </defs>
          <circle cx="250" cy="250" r="245" fill="url(#bgGrad2)" stroke="#1A2D4A" stroke-width="1.5"/>
          <circle cx="250" cy="250" r="230" fill="none" stroke="#1A2D4A" stroke-width="0.5" opacity="0.4"/>
          
          <!-- "P" stays static -->
          <text x="250" y="290" font-family="Georgia, 'Playfair Display', serif" font-size="180" font-weight="bold" fill="#FFFFFF" text-anchor="middle" filter="url(#glowP2)" opacity="0.95">P</text>

          <!-- Orbit + nodes rotate -->
          <g class="orbit-group">
            <ellipse class="orbit-line" cx="250" cy="250" rx="195" ry="80" fill="none" stroke="url(#orbitGrad2)" stroke-width="2" opacity="0.7" filter="url(#glowOrbit2)"/>
            <g class="lang-node"><g transform="translate(445, 250)"><circle r="18" fill="#FF9933" opacity="0.9" filter="url(#glowNode2)"/><text y="6" font-family="'Noto Sans Devanagari', sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">हि</text></g></g>
            <g class="lang-node"><g transform="translate(375, 189)"><circle r="16" fill="#E8870E" opacity="0.85" filter="url(#glowNode2)"/><text y="5" font-family="'Noto Sans Tamil', sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">த</text></g></g>
            <g class="lang-node"><g transform="translate(250, 170)"><circle r="16" fill="#CCCCCC" opacity="0.8" filter="url(#glowNode2)"/><text y="5" font-family="'Noto Sans Bengali', sans-serif" font-size="13" fill="#1A1A2E" text-anchor="middle" font-weight="bold">ব</text></g></g>
            <g class="lang-node"><g transform="translate(125, 189)"><circle r="16" fill="#FFFFFF" opacity="0.85" filter="url(#glowNode2)"/><text y="5" font-family="'Noto Sans Telugu', sans-serif" font-size="13" fill="#1A1A2E" text-anchor="middle" font-weight="bold">తె</text></g></g>
            <g class="lang-node"><g transform="translate(55, 250)"><circle r="18" fill="#138808" opacity="0.9" filter="url(#glowNode2)"/><text y="6" font-family="'Noto Sans Devanagari', sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">म</text></g></g>
            <g class="lang-node"><g transform="translate(125, 311)"><circle r="16" fill="#10B981" opacity="0.85" filter="url(#glowNode2)"/><text y="5" font-family="'Noto Sans Gujarati', sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">ગુ</text></g></g>
            <g class="lang-node"><g transform="translate(250, 330)"><circle r="16" fill="#DDDDDD" opacity="0.8" filter="url(#glowNode2)"/><text y="5" font-family="'Noto Sans Kannada', sans-serif" font-size="13" fill="#1A1A2E" text-anchor="middle" font-weight="bold">ಕ</text></g></g>
            <g class="lang-node"><g transform="translate(375, 311)"><circle r="16" fill="#F59E0B" opacity="0.85" filter="url(#glowNode2)"/><text y="5" font-family="'Noto Sans Gurmukhi', sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">ਪ</text></g></g>
          </g>

          <g opacity="0.15">
            <circle cx="310" cy="178" r="2" fill="#FF9933"/>
            <circle cx="190" cy="322" r="2" fill="#138808"/>
            <circle cx="420" cy="230" r="2" fill="#FFFFFF"/>
            <circle cx="80" cy="270" r="2" fill="#FFFFFF"/>
          </g>
        </svg>
      </div>
      <p class="version-label">Animated</p>
    </div>
  </div>

  <div class="brand-text">
    <h2>PRATINIDHI</h2>
    <p>Platform for Real-time Avatar Translation Intelligence</p>
  </div>

</body>
</html>
